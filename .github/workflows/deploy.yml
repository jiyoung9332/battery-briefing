name: Update Data and Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data from Google Sheet (with AI summary)
        run: node scripts/fetch-data.cjs
        env:
          SHEET_ID: '1Td8b1PEOLYdaMfNqRcOUu1S0n0-G36sSX85WTKv43oI'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit AI summary cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in scripts/ai-cache.json scripts/first-seen-cache.json scripts/weekly-insight-history.json; do
            [ -f "$f" ] && git add "$f"
          done
          if ! git diff --staged --quiet; then
            git commit -m "chore: update AI summary cache [skip ci]"
            git push
          else
            echo "No cache changes to commit"
          fi
        continue-on-error: true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
